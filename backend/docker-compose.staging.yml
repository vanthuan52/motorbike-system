name: motorbike-system

services:
  # Main API service
  apis:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        NODE_ENV: staging
    container_name: motorbike-apis
    hostname: apis
    ports:
      - 5300:5300
    env_file:
      - .env
    environment:
      - NODE_ENV=staging
    restart: on-failure:5
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      jwks-server:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:5300/api/hello',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles: ['apis']
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # JWKS Server for token validation
  jwks-server:
    image: nginx:alpine
    container_name: motorbike-jwks-server
    hostname: jwks-server
    ports:
      - '5301:80'
    volumes:
      - ./keys/access-jwks.json:/usr/share/nginx/html/.well-known/access-jwks.json
      - ./keys/refresh-jwks.json:/usr/share/nginx/html/.well-known/refresh-jwks.json
      - ./docker/jwks-server/jwks.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:80/.well-known/access-jwks.json',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis for caching and queues — internal only, not exposed to host
  redis:
    image: redis:8.0-alpine
    container_name: motorbike-redis
    hostname: redis
    ports:
      - '5302:6379'
    volumes:
      - redis_data:/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 30s
      retries: 5

  # Bull dashboard for queue monitoring
  redis-bullboard:
    image: venatum/bull-board:latest
    container_name: motorbike-bullboard
    hostname: redis-bullboard
    ports:
      - 5303:3000
    networks:
      - app-network
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BULL_PREFIX=Queue
      - USER_LOGIN=${BULL_BOARD_USER:-admin}
      - USER_PASSWORD=${BULL_BOARD_PASSWORD}
      - REDIS_DB=1
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M

  # MongoDB Replica Set - Primary Node — internal only, not exposed to host
  mongo:
    image: mongo:8.0
    container_name: motorbike-mongo
    hostname: mongo
    ports:
      - '5304:27017'
    networks:
      - app-network
    volumes:
      - mongo_data:/data/db
    command: mongod --bind_ip_all --replSet rs0 --port 27017
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1GB
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MongoDB Replica Set Initialization — runs once then exits
  mongo-init:
    image: mongo:8.0
    container_name: motorbike-mongo-init
    restart: 'no'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    command: >
      bash -c "
      echo 'Initializing MongoDB replica set...' &&
      mongosh --host mongo:27017 --eval '
      rs.initiate({
        _id: \"rs0\",
        members: [{ _id: 0, host: \"mongo:27017\", priority: 1 }]
      });
      rs.status();' &&
      echo 'Replica set initialized. Container exiting.'
      "
    deploy:
      restart_policy:
        condition: none

  # MinIO — S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: motorbike-minio
    hostname: minio
    ports:
      - '5305:9000'
      - '5306:9001'
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test:
        [
          'CMD',
          'curl',
          '--fail',
          '--silent',
          'http://localhost:9000/minio/health/live',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # MinIO Initialization — creates buckets, users, policies then exits
  minio-init:
    image: minio/mc:latest
    container_name: motorbike-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./docker/minio/policies:/policies
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_APP_ACCESS_KEY=${AWS_S3_IAM_CREDENTIAL_KEY}
      - MINIO_APP_SECRET_KEY=${AWS_S3_IAM_CREDENTIAL_SECRET}
      - PUBLIC_BUCKET=${AWS_S3_PUBLIC_BUCKET:-app-public-files}
      - PRIVATE_BUCKET=${AWS_S3_PRIVATE_BUCKET:-app-private-files}
    entrypoint: >
      /bin/sh -c "
      echo '=== MinIO Initialization ===' &&
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&

      echo '[1/6] Creating buckets...' &&
      mc mb --ignore-existing local/$$PUBLIC_BUCKET &&
      mc mb --ignore-existing local/$$PRIVATE_BUCKET &&

      echo '[2/6] Creating app user...' &&
      mc admin user add local $$MINIO_APP_ACCESS_KEY $$MINIO_APP_SECRET_KEY || true &&

      echo '[3/6] Applying IAM policy...' &&
      mc admin policy create local app-policy /policies/app-policy.json || true &&
      mc admin policy attach local app-policy --user $$MINIO_APP_ACCESS_KEY &&

      echo '[4/6] Setting anonymous public read on public bucket...' &&
      mc anonymous set download local/$$PUBLIC_BUCKET &&

      echo '[5/6] Applying CORS rules...' &&
      mc cors set /policies/cors-public.json  local/$$PUBLIC_BUCKET &&
      mc cors set /policies/cors-private.json local/$$PRIVATE_BUCKET &&

      echo '[6/6] Applying lifecycle rules...' &&
      mc ilm import local/$$PUBLIC_BUCKET  < /policies/lifecycle.json &&
      mc ilm import local/$$PRIVATE_BUCKET < /policies/lifecycle.json &&

      echo '=== MinIO initialization complete. Container exiting. ===';
      "
    deploy:
      restart_policy:
        condition: none

volumes:
  mongo_data:
  redis_data:
  minio_data:

networks:
  app-network:
    driver: bridge
