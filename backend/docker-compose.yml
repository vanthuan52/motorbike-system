name: nestjs-motorbike-system

services:
  # Main API service
  apis:
    build:
      context: .
      dockerfile: ./ci/Dockerfile
    hostname: apis
    ports:
      - 5300:5300
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./src/:/app/src/
      - ./.env:/app/.env
      - ./keys/access-token.pem:/app/keys/access-token.pem
      - ./keys/access-token.pub:/app/keys/access-token.pub
      - ./keys/refresh-token.pem:/app/keys/refresh-token.pem
      - ./keys/refresh-token.pub:/app/keys/refresh-token.pub
    restart: on-failure
    networks:
      - app-network
    depends_on:
      - redis
      - mongo
      - jwks-server
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # JWKS Server for token validation
  jwks-server:
    image: nginx:alpine
    hostname: jwks-server
    ports:
      - '5301:80'
    volumes:
      - ./keys/jwks.json:/usr/share/nginx/html/.well-known/jwks.json
      - ./ci/jwks-server/jwks.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80/.well-known/jwks.json']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Redis for caching and queues
  redis:
    image: redis:latest
    hostname: redis
    ports:
      - '5302:6379'
    volumes:
      - redis_data:/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 30s
      retries: 5

  # Bull dashboard for queue monitoring
  redis-bullboard:
    image: deadly0/bull-board:3.2.6
    hostname: redis-bullboard
    ports:
      - 5303:3000
    networks:
      - app-network
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BULL_PREFIX=bull
      - USER_LOGIN=admin
      - USER_PASSWORD=admin123
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M

  # MongoDB Replica Set - Primary Node
  mongo:
    image: mongo:latest
    hostname: mongo
    ports:
      - '5304:27017'
    networks:
      - app-network
    volumes:
      - mongo_data:/data/db
    command: mongod --bind_ip_all --replSet rs0 --port 27017
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # MongoDB Replica Set Initialization service
  mongo-init:
    image: mongo:latest
    restart: 'no'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    command: >
      bash -c "
      echo 'Waiting for MongoDB instance to be ready...' &&
      mongosh --host mongo:27017 --eval '
      config = {
              \"_id\": \"rs0\",
              \"members\": [
              { \"_id\": 0, \"host\": \"mongo:27017\", \"priority\": 1 }
          ]
      };
      rs.initiate(config);
      rs.status();'&&
      echo 'Single-node replica set initialized successfully. Container will exit now.'
      "
    deploy:
      restart_policy:
        condition: none

  # minio:
  #   image: minio/minio
  #   hostname: minio
  #   container_name: minio
  #   restart: always
  #   ports:
  #     - '5305:9000'
  #     - '5306:9001'
  #   environment:
  #     - MINIO_ROOT_USER=miniomotorbike
  #     - MINIO_ROOT_PASSWORD=changeme
  #   volumes:
  #     - minio_data:/data
  #   command: server --console-address ":9001" /data
  #   networks:
  #     - app-network
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M

volumes:
  mongo_data:
  redis_data:
  # minio_data:

networks:
  app-network:
    driver: bridge
