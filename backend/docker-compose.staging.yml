name: nestjs-motorbike-system

services:
  # Main API service
  apis:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    hostname: apis
    ports:
      - 5300:5300
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./src/:/app/src/
      - ./.env:/app/.env
      - ./prisma/:/app/prisma/
    restart: on-failure
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      jwks-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:5300/api/hello',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles: ['apis']
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # JWKS Server for token validation
  jwks-server:
    image: nginx:alpine
    hostname: jwks-server
    ports:
      - '5301:80'
    volumes:
      - ./keys/access-jwks.json:/usr/share/nginx/html/.well-known/access-jwks.json
      - ./keys/refresh-jwks.json:/usr/share/nginx/html/.well-known/refresh-jwks.json
      - ./docker/jwks-server/jwks.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:80/.well-known/access-jwks.json',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis for caching and queues
  redis:
    image: redis:latest
    hostname: redis
    ports:
      - '5302:6379'
    volumes:
      - redis_data:/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 30s
      retries: 5

  # Bull dashboard for queue monitoring
  redis-bullboard:
    image: venatum/bull-board:latest
    hostname: redis-bullboard
    ports:
      - 5303:3000
    networks:
      - app-network
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BULL_PREFIX=Queue
      - USER_LOGIN=admin
      - USER_PASSWORD=admin123
      - REDIS_DB=1
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M

  # MongoDB Replica Set - Primary Node
  mongo:
    image: mongo:latest
    hostname: mongo
    ports:
      - '5304:27017'
    networks:
      - app-network
    volumes:
      - mongo_data:/data/db
    command: mongod --bind_ip_all --replSet rs0 --port 27017
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1GB
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MongoDB Replica Set Initialization service
  mongo-init:
    image: mongo:latest
    restart: 'no'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    command: >
      bash -c "
      echo 'Waiting for MongoDB instance to be ready...' &&
      mongosh --host host.docker.internal:27017 --eval '
      config = {
              \"_id\": \"rs0\",
              \"members\": [
              { \"_id\": 0, \"host\": \"host.docker.internal:27017\", \"priority\": 1 }
          ]
      };
      rs.initiate(config);
      rs.status();'&&
      echo 'Single-node replica set initialized successfully. Container will exit now.'
      "
    deploy:
      restart_policy:
        condition: none

  # minio:
  #   image: minio/minio
  #   hostname: minio
  #   container_name: minio
  #   restart: always
  #   ports:
  #     - '5305:9000'
  #     - '5306:9001'
  #   environment:
  #     - MINIO_ROOT_USER=miniomotorbike
  #     - MINIO_ROOT_PASSWORD=changeme
  #   volumes:
  #     - minio_data:/data
  #   command: server --console-address ":9001" /data
  #   networks:
  #     - app-network
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M

volumes:
  mongo_data:
  redis_data:
  # minio_data:

networks:
  app-network:
    driver: bridge
