name: motorbike-system-prod

services:
  # ──────────────────────────────────────────────────────────────
  # NestJS API Service
  # ──────────────────────────────────────────────────────────────
  apis:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        NODE_ENV: production
    container_name: motorbike-prod-apis
    hostname: apis
    restart: always
    ports:
      - '5300:5300'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Internal service URLs (override .env values for container networking)
      - DATABASE_URL=mongodb://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@mongo:27017/${DATABASE_NAME:-motorbike_system}?retryWrites=true&w=majority&replicaSet=rs0&authSource=admin
      - AUTH_JWT_ACCESS_TOKEN_JWKS_URI=http://jwks-server:80/.well-known/access-jwks.json
      - AUTH_JWT_REFRESH_TOKEN_JWKS_URI=http://jwks-server:80/.well-known/refresh-jwks.json
      - CACHE_REDIS_URL=redis://redis:6379/0
      - QUEUE_REDIS_URL=redis://redis:6379/1
      - STORAGE_ENDPOINT=http://minio:9000
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      jwks-server:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:5300/api/hello',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '10'

  # ──────────────────────────────────────────────────────────────
  # MongoDB with Replica Set — required by Prisma for transactions
  # ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:8.0
    container_name: motorbike-prod-mongo
    hostname: mongo
    restart: always
    # Production: no host port — only accessible within the Docker network
    # Uncomment the line below if you need to connect from the host for maintenance
    # ports:
    #   - '127.0.0.1:27017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DATABASE_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/mongo.key:/etc/mongo/mongo.key:ro
    entrypoint:
      - bash
      - -c
      - |
        cp /etc/mongo/mongo.key /tmp/mongo.key
        chmod 400 /tmp/mongo.key
        chown mongodb:mongodb /tmp/mongo.key
        exec docker-entrypoint.sh "$$@"
      - --
    command:
      - mongod
      - '--replSet'
      - rs0
      - '--bind_ip_all'
      - '--keyFile'
      - /tmp/mongo.key
      - '--wiredTigerCacheSizeGB'
      - '0.5'
      - '--oplogSize'
      - '128'
      - '--quiet'
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: >-
        mongosh -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD}
        --authenticationDatabase admin --eval "db.adminCommand('ping')" --quiet
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '10'

  # MongoDB Replica Set Initialization — runs once then exits
  mongo-init:
    image: mongo:8.0
    container_name: motorbike-prod-mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    command: >-
      bash -c
      "echo 'Initializing MongoDB replica set...' &&
      mongosh --host mongo:27017 -u $$MONGO_USER -p $$MONGO_PASS --authenticationDatabase admin --eval '
        try {
          rs.status();
          print(\"Replica set already initialized.\");
        } catch(e) {
          rs.initiate({ _id: \"rs0\", members: [{ _id: 0, host: \"mongo:27017\" }] });
          print(\"Replica set initialized.\");
        }
      ' &&
      echo 'Done.'"
    environment:
      - MONGO_USER=${DATABASE_USERNAME}
      - MONGO_PASS=${DATABASE_PASSWORD}
    deploy:
      restart_policy:
        condition: none

  # ──────────────────────────────────────────────────────────────
  # JWKS Server — serves public keys for JWT verification
  # ──────────────────────────────────────────────────────────────
  jwks-server:
    image: nginx:alpine
    container_name: motorbike-prod-jwks-server
    hostname: jwks-server
    restart: always
    # No host port — only accessible within the Docker network
    volumes:
      - ./keys/access-jwks.json:/usr/share/nginx/html/.well-known/access-jwks.json:ro
      - ./keys/refresh-jwks.json:/usr/share/nginx/html/.well-known/refresh-jwks.json:ro
      - ./docker/jwks-server/jwks.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 16M
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:80/.well-known/access-jwks.json',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'

  # ──────────────────────────────────────────────────────────────
  # Redis — caching and queues
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:8.0-alpine
    container_name: motorbike-prod-redis
    hostname: redis
    restart: always
    # No host port — only accessible within the Docker network
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'

  # ──────────────────────────────────────────────────────────────
  # Bull Board — queue monitoring dashboard (optional)
  # ──────────────────────────────────────────────────────────────
  redis-bullboard:
    image: venatum/bull-board:latest
    container_name: motorbike-prod-bullboard
    hostname: redis-bullboard
    restart: unless-stopped
    # Bind to localhost only — access via SSH tunnel or reverse proxy
    ports:
      - '127.0.0.1:5303:3000'
    networks:
      - app-network
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BULL_PREFIX=Queue
      - USER_LOGIN=${BULL_BOARD_USER:-admin}
      - USER_PASSWORD=${BULL_BOARD_PASSWORD}
      - REDIS_DB=1
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    profiles: ['monitoring']

  # ──────────────────────────────────────────────────────────────
  # MinIO — S3-compatible object storage
  # ──────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: motorbike-prod-minio
    hostname: minio
    restart: always
    # No host port for API — only accessible within the Docker network
    # Console bound to localhost only — access via SSH tunnel
    ports:
      - '127.0.0.1:9001:9001'
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test:
        [
          'CMD',
          'curl',
          '--fail',
          '--silent',
          'http://localhost:9000/minio/health/live',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '10'

  # MinIO Initialization — creates buckets, users, policies then exits
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: motorbike-prod-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./docker/minio/policies:/policies:ro
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_APP_ACCESS_KEY=${AWS_S3_IAM_CREDENTIAL_KEY}
      - MINIO_APP_SECRET_KEY=${AWS_S3_IAM_CREDENTIAL_SECRET}
      - PUBLIC_BUCKET=${AWS_S3_PUBLIC_BUCKET:-app-public-files}
      - PRIVATE_BUCKET=${AWS_S3_PRIVATE_BUCKET:-app-private-files}
      - TEMP_BUCKET=${AWS_S3_TEMP_BUCKET:-app-temp-processing}
    entrypoint: >
      /bin/sh -c "
      echo '=== MinIO Initialization ===' &&
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&

      echo '[1/6] Creating buckets...' &&
      mc mb --ignore-existing local/$$PUBLIC_BUCKET &&
      mc mb --ignore-existing local/$$PRIVATE_BUCKET &&
      mc mb --ignore-existing local/$$TEMP_BUCKET &&

      echo '[2/6] Creating app user...' &&
      mc admin user add local $$MINIO_APP_ACCESS_KEY $$MINIO_APP_SECRET_KEY || true &&

      echo '[3/6] Applying IAM policy...' &&
      mc admin policy create local app-policy /policies/app-policy.json || true &&
      mc admin policy attach local app-policy --user $$MINIO_APP_ACCESS_KEY &&

      echo '[4/6] Setting anonymous public read on public bucket...' &&
      mc anonymous set download local/$$PUBLIC_BUCKET &&

      echo '[5/6] Applying CORS rules...' &&
      mc cors set /policies/cors-public.json  local/$$PUBLIC_BUCKET &&
      mc cors set /policies/cors-private.json local/$$PRIVATE_BUCKET &&

      echo '[6/6] Applying lifecycle rules...' &&
      mc ilm import local/$$PUBLIC_BUCKET  < /policies/lifecycle.json &&
      mc ilm import local/$$PRIVATE_BUCKET < /policies/lifecycle.json &&

      echo '=== MinIO initialization complete. Container exiting. ===';
      "
    deploy:
      restart_policy:
        condition: none

volumes:
  mongo_data:
  redis_data:
  minio_data:

networks:
  app-network:
    driver: bridge
