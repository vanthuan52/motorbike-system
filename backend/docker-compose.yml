  minio:
    image: minio/minio
    hostname: minio
    container_name: minio
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      - MINIO_ROOT_USER=miniomotorbike
      - MINIO_ROOT_PASSWORD=changeme
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data
    networks:
      - app-network

volumes:
  minio_data:

networks:
  app-network:
    driver: bridge
